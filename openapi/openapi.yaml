components:
  parameters:
    EntityId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    DrugId:
      name: drug_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    DrugSlug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    DiseaseSlug:
      name: slug
      in: path
      required: true
      schema: { type: string, description: "Disease curriculum slug, e.g. hypertension" }
    WorkflowId:
      name: workflow_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    EvidenceId:
      name: evidence_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PageLimit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    DashboardLimit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    PageOffset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    DatasetVersion:
      name: dataset_version
      in: query
      schema: { type: string }
    ContentLayers:
      name: layers
      in: query
      description: Comma-separated content layers
      schema:
        type: string
        example: biomedical,education
    ResponseMode:
      name: mode
      in: query
      schema:
        type: string
        enum: [minimal, summary, full, graph]
        default: summary

  responses:
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HttpDetailError"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HttpDetailError"
    Forbidden:
      description: Missing required scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HttpDetailError"
    BadRequest:
      description: Invalid request or workflow state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HttpDetailError"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    TokenRequest:
      type: object
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum: [password, api_key]
        username:
          type: string
          description: Email address for password grant
        password:
          type: string
          format: password
        api_key:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: bearer }
        expires_in: { type: integer, description: Access token lifetime in seconds }
        scopes:
          type: array
          items: { type: string }
        email: { type: string, nullable: true }
        name: { type: string, nullable: true }

    IntrospectRequest:
      type: object
      properties:
        api_key:
          type: string
          description: API key when not sent via Authorization or X-API-Key header
        access_token:
          type: string
          description: JWT when not sent via Authorization header

    IntrospectResponse:
      type: object
      required: [active, scopes, roles, token_type, auth_method]
      properties:
        active: { type: boolean, example: true }
        scopes:
          type: array
          items: { type: string }
        roles:
          type: array
          items: { type: string }
        user_id: { type: string, format: uuid, nullable: true }
        organization_id: { type: string, format: uuid, nullable: true }
        workspace_id: { type: string, format: uuid, nullable: true }
        token_type:
          type: string
          enum: [bearer, api_key]
        auth_method:
          type: string
          enum: [jwt, api_key]
        expires_at:
          type: integer
          nullable: true
          description: Unix timestamp when the credential expires
        email: { type: string, nullable: true }
        name: { type: string, nullable: true }

    HttpDetailError:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                type: object

    HealthEnvelopeResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/HealthData" }
        meta: { $ref: "#/components/schemas/ResponseMeta" }

    InfoEnvelopeResponse:
      type: object
      properties:
        data: { type: object, additionalProperties: true }
        meta: { $ref: "#/components/schemas/ResponseMeta" }

    DashboardResponse:
      type: object
      properties:
        data: { type: object, additionalProperties: true }
        meta: { $ref: "#/components/schemas/ResponseMeta" }

    AuditLogListResponse:
      type: object
      properties:
        data: { type: array, items: { type: object } }
        meta: { $ref: "#/components/schemas/ResponseMeta" }

    JobListResponse:
      type: object
      properties:
        data: { type: array, items: { type: object } }
        meta: { $ref: "#/components/schemas/ResponseMeta" }

    SnapshotItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        version_tag: { type: string }
        module: { type: string, nullable: true }
        status: { type: string }
        ontology_version: { type: string }
        api_version: { type: string }
        entity_count: { type: integer }
        relationship_count: { type: integer }
        evidence_count: { type: integer }
        manifest: { type: object, additionalProperties: true }
        released_at: { type: string, format: date-time, nullable: true }
        released_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
