openapi: 3.1.0
info:
  title: FarmacoGraph API
  version: 1.0.0
  description: |
    **The API is the product.** FarmacoGraph never exposes Neo4j or PostgreSQL directly.

    Universal interface for medical education apps, simulators, flashcard generators,
    AI assistants, and third-party developers.

    ## Content Layers
    - `biomedical` — validated facts
    - `education` — pedagogical content
    - `learning` — prerequisite knowledge graph

    ## Response Modes
    - `minimal` — IDs and labels only
    - `summary` — default
    - `full` — all properties
    - `graph` — subgraph projection
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: FarmacoGraph
    url: https://farmacograph.org

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Health
  - name: Auth
  - name: Dashboard
  - name: Curator
  - name: Drugs
  - name: Entities
  - name: Clinical
  - name: Education
  - name: Learning
  - name: Evidence
  - name: Graph
  - name: Explain
  - name: Search
  - name: Modules
  - name: Future

paths:
  /auth/token:
    post:
      tags: [Auth]
      summary: Issue access and refresh tokens
      operationId: issueToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/introspect:
    post:
      tags: [Auth]
      summary: Introspect credentials (JWT or API key)
      operationId: introspectCredentials
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Credential is active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"
        "401":
          description: Invalid, expired, or missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpDetailError"

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelopeResponse"

  /info:
    get:
      tags: [Health]
      summary: Public API discovery
      operationId: apiInfo
      responses:
        "200":
          description: API metadata and documentation links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoEnvelopeResponse"

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Curation Studio operational dashboard
      operationId: getDashboard
      security:
        - BearerAuth: []
      parameters:
        - name: module
          in: query
          schema: { type: string, default: cardiovascular }
      responses:
        "200":
          description: Dashboard aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /audit-logs:
    get:
      tags: [Dashboard]
      summary: List audit log entries
      operationId: listAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/PageOffset"
        - name: resource_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /jobs:
    get:
      tags: [Dashboard]
      summary: List background jobs
      operationId: listJobs
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/PageOffset"
        - name: status
          in: query
          schema: { type: string }
        - name: job_type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /snapshots:
    get:
      tags: [Snapshots]
      summary: List knowledge release snapshots
      operationId: listSnapshots
      security:
        - BearerAuth: []
      parameters:
        - name: module
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /snapshots/{version_tag}:
    get:
      tags: [Snapshots]
      summary: Get snapshot by version tag
      operationId: getSnapshot
      security:
        - BearerAuth: []
      parameters:
        - name: version_tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Snapshot detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /curator/drugs:
    get:
      tags: [Curator]
      summary: Browse drugs for curation
      operationId: listCuratorDrugs
      security:
        - BearerAuth: [curator:write]
      parameters:
        - name: module
          in: query
          schema: { type: string, default: cardiovascular }
        - name: search
          in: query
          schema: { type: string, default: "" }
        - name: status
          in: query
          schema: { type: string }
        - name: workflow_state
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, default: slug }
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
      responses:
        "200":
          description: Curator drug browser rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuratorDrugListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/workflows:
    post:
      tags: [Curator]
      summary: Open or create workflow for a drug slug
      operationId: openDrugWorkflow
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "201":
          description: Workflow opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrugWorkflowOpenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/package:
    get:
      tags: [Curator]
      summary: Get draft package for a drug slug
      operationId: getDrugPackage
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "200":
          description: Draft package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrugPackageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/education:
    get:
      tags: [Curator, Education]
      summary: List draft education content for a drug by curriculum slug
      operationId: listCuratorDrugEducation
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "200":
          description: Draft drug education content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/education/flashcards:
    get:
      tags: [Curator, Education]
      summary: List draft flashcards for a drug by curriculum slug
      operationId: listCuratorDrugFlashcards
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "200":
          description: Draft drug flashcards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/evidence:
    get:
      tags: [Curator, Evidence]
      summary: List evidence for a drug by curriculum slug
      operationId: listCuratorDrugEvidence
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "200":
          description: Drug evidence attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Curator, Evidence]
      summary: Attach evidence to a drug by slug
      operationId: attachCuratorDrugEvidence
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachDrugEvidenceRequest"
      responses:
        "201":
          description: Evidence attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceDrugLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Neo4j unavailable

  /curator/drugs/{slug}/evidence/{evidence_id}:
    delete:
      tags: [Curator, Evidence]
      summary: Detach evidence from a drug by slug
      operationId: detachCuratorDrugEvidence
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
        - name: evidence_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Evidence detached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceDrugLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /curator/diseases:
    get:
      tags: [Curator]
      summary: Browse diseases for curation
      operationId: listCuratorDiseases
      security:
        - BearerAuth: [curator:write]
      parameters:
        - name: search
          in: query
          schema: { type: string, default: "" }
        - name: status
          in: query
          schema: { type: string }
        - name: workflow_state
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, default: slug }
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
      responses:
        "200":
          description: Curator disease browser rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuratorDiseaseListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/diseases/{slug}/workflows:
    post:
      tags: [Curator]
      summary: Open or create workflow for a disease slug
      operationId: openDiseaseWorkflow
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DiseaseSlug"
      responses:
        "201":
          description: Workflow opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseWorkflowOpenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/diseases/{slug}/package:
    get:
      tags: [Curator]
      summary: Get draft package for a disease slug
      operationId: getDiseasePackage
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DiseaseSlug"
      responses:
        "200":
          description: Draft package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseasePackageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/diseases/{slug}/workflow-state:
    get:
      tags: [Curator]
      summary: Aggregate workflow, autosave, and validation for a disease slug
      operationId: getDiseaseWorkflowState
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DiseaseSlug"
      responses:
        "200":
          description: Disease workflow state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityWorkflowStateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/drugs/{slug}/workflow-state:
    get:
      tags: [Curator]
      summary: Aggregate workflow, autosave, and validation for a drug slug
      operationId: getDrugWorkflowState
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugSlug"
      responses:
        "200":
          description: Drug workflow state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityWorkflowStateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/workflows:
    post:
      tags: [Curator]
      summary: Create draft workflow
      operationId: createWorkflow
      security:
        - BearerAuth: [curator:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRequest"
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowEnvelopeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/workflows/{workflow_id}:
    get:
      tags: [Curator]
      summary: Get workflow by ID
      operationId: getWorkflow
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowEnvelopeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /curator/workflows/{workflow_id}/timeline:
    get:
      tags: [Curator]
      summary: Workflow activity timeline
      operationId: getWorkflowTimeline
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Chronological audit events for the workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTimelineResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /curator/workflows/{workflow_id}/package:
    put:
      tags: [Curator]
      summary: Save draft package
      operationId: saveWorkflowPackage
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSaveResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /curator/workflows/{workflow_id}/submit:
    post:
      tags: [Curator]
      summary: Submit workflow for review
      operationId: submitWorkflow
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      responses:
        "200":
          description: Workflow submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowEnvelopeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/workflows/{workflow_id}/approve:
    post:
      tags: [Curator]
      summary: Approve workflow
      operationId: approveWorkflow
      security:
        - BearerAuth: [curator:publish]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      responses:
        "200":
          description: Workflow approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowEnvelopeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/workflows/{workflow_id}/publish:
    post:
      tags: [Curator]
      summary: Publish approved workflow to graph
      operationId: publishWorkflow
      security:
        - BearerAuth: [curator:publish]
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Workflow published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishWorkflowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/queue:
    get:
      tags: [Curator]
      summary: Review queue
      operationId: getCuratorQueue
      security:
        - BearerAuth: [curator:write]
      parameters:
        - name: state
          in: query
          schema: { type: string, default: review }
        - $ref: "#/components/parameters/DashboardLimit"
      responses:
        "200":
          description: Queued workflows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/validate:
    post:
      tags: [Curator]
      summary: Dry-run publish validation
      operationId: validatePackage
      security:
        - BearerAuth: [curator:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/validation-summary:
    get:
      tags: [Curator]
      summary: Validation job summary
      operationId: getValidationSummary
      security:
        - BearerAuth: [curator:write]
      responses:
        "200":
          description: Validation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /curator/stubs/cardiovascular:
    get:
      tags: [Curator]
      summary: Structural cardiovascular stub template
      operationId: getCardiovascularStub
      security:
        - BearerAuth: [curator:write]
      responses:
        "200":
          description: Stub publish package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StubPackageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /drugs:
    get:
      tags: [Drugs]
      summary: List drugs
      operationId: listDrugs
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/PageOffset"
        - name: module
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/DatasetVersion"
      responses:
        "200":
          description: Drug list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrugListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drugs/{drug_id}:
    get:
      tags: [Drugs]
      summary: Get drug by ID
      operationId: getDrug
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DrugId"
        - $ref: "#/components/parameters/DatasetVersion"
      responses:
        "200":
          description: Drug detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrugDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drugs/{drug_id}/evidence:
    get:
      tags: [Drugs, Evidence]
      summary: List evidence attached to a drug
      operationId: listDrugEvidence
      security:
        - BearerAuth: [knowledge:read]
      parameters:
        - $ref: "#/components/parameters/DrugId"
        - $ref: "#/components/parameters/DatasetVersion"
      responses:
        "200":
          description: Drug evidence attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Drugs, Evidence]
      summary: Attach evidence to a drug
      operationId: attachDrugEvidence
      security:
        - BearerAuth: [curator:write]
      parameters:
        - $ref: "#/components/parameters/DrugId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
