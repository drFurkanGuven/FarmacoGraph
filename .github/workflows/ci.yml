name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,db,auth,observability,dev]"

      - name: Ruff lint
        run: ruff check farmacograph tests

      - name: Validate OpenAPI spec
        run: python -c "import yaml; yaml.safe_load(open('openapi/openapi.yaml'))"

      - name: Validate ontology JSON
        run: |
          python -c "import json; json.load(open('ontology/relationships.json'))"
          python -c "import json; json.load(open('ontology/constraints.json'))"

      - name: Run tests with coverage
        env:
          FG_ENVIRONMENT: test
          FG_DATABASE_URL: sqlite+aiosqlite:///:memory:
          FG_NEO4J_ENABLED: "false"
          FG_LOG_JSON: "false"
        run: pytest --cov=farmacograph --cov-report=term-missing --cov-fail-under=60

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t farmacograph:ci .
