name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,db,auth,observability,dev]"

      - name: Ruff lint
        run: ruff check farmacograph tests

      - name: Ruff format check
        run: ruff format --check farmacograph tests

      - name: Validate OpenAPI spec
        run: python -c "import yaml; yaml.safe_load(open('openapi/openapi.yaml'))"

      - name: Validate ontology JSON
        run: |
          python -c "import json; json.load(open('ontology/relationships.json'))"
          python -c "import json; json.load(open('ontology/constraints.json'))"

  python-typecheck:
    name: Python typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,db,auth,observability,dev]"

      - name: mypy
        continue-on-error: true
        run: mypy farmacograph

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,db,auth,observability,dev]"

      - name: Run unit and contract tests with coverage
        env:
          FG_ENVIRONMENT: test
          FG_DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          FG_NEO4J_ENABLED: "false"
          FG_LOG_JSON: "false"
        run: |
          pytest -m "not integration" --cov=farmacograph --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: coverage.xml

  python-integration:
    name: Python integration tests
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,db,auth,observability,dev]"

      - name: Run integration tests
        env:
          FG_ENVIRONMENT: test
          FG_DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          FG_NEO4J_ENABLED: "false"
          FG_LOG_JSON: "false"
        run: pytest -m integration -v

  studio:
    name: Studio lint & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload Studio coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: studio-coverage
          path: apps/studio/coverage/

  studio-e2e:
    name: Studio Playwright smoke
    runs-on: ubuntu-latest
    needs: studio
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/studio/playwright-report/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t farmacograph:ci .
