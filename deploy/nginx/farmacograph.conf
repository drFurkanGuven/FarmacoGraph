# FarmacoGraph API — reverse proxy
# Install: see docs/deploy-nginx.md
#
# API port: must match FG_HOST_API_PORT in .env (default 8001)
#   grep FG_HOST_API_PORT ~/FarmacoGraph/.env

upstream farmacograph_api {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name farmacograph.furkanguven.space;

    # Certbot will add HTTPS redirect; uncomment after first certbot run if needed:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://farmacograph_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # FastAPI / OpenAPI docs
        proxy_buffering off;
    }
}

# After: sudo certbot --nginx -d farmacograph.furkanguven.space
# Certbot adds a second server { listen 443 ssl; ... } block automatically.
