# FarmacoGraph — HTTP + HTTPS reverse proxy
# Install: ./scripts/install-nginx.sh (port only) OR copy manually after certbot
#
# Prerequisites:
#   sudo certbot certonly --nginx -d farmacograph.furkanguven.space
#   ls /etc/letsencrypt/live/farmacograph.furkanguven.space/

upstream farmacograph_api {
    server 127.0.0.1:8001;
    keepalive 16;
}

upstream farmacograph_studio {
    server 127.0.0.1:3001;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name farmacograph.furkanguven.space;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → API + Curation Studio
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name farmacograph.furkanguven.space;

    ssl_certificate /etc/letsencrypt/live/farmacograph.furkanguven.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/farmacograph.furkanguven.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Curation Studio (Next.js, basePath /studio)
    location /studio/ {
        proxy_pass http://farmacograph_studio/studio/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /studio {
        return 301 https://$host/studio/;
    }

    # API, Swagger, public search page
    location / {
        proxy_pass http://farmacograph_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
