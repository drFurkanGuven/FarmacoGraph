# FarmacoGraph API — reverse proxy
# Install: ./scripts/install-nginx.sh
# API port: FG_HOST_API_PORT in .env (default 8001)

upstream farmacograph_api {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name farmacograph.furkanguven.space;

    location / {
        proxy_pass http://farmacograph_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# certbot --nginx adds listen 443 ssl; location / MUST proxy_pass to farmacograph_api
# If /docs returns 404 on HTTPS, run: sudo nginx -T | grep -A25 farmacograph
