# FarmacoGraph local development stack
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacograph-postgres
    environment:
      POSTGRES_USER: farmacograph
      POSTGRES_PASSWORD: farmacograph
      POSTGRES_DB: farmacograph
    ports:
      - "${FG_HOST_PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmacograph"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: farmacograph-neo4j
    environment:
      NEO4J_AUTH: neo4j/farmacograph
      NEO4J_PLUGINS: '[]'
    ports:
      - "${FG_HOST_NEO4J_HTTP_PORT:-7474}:7474"
      - "${FG_HOST_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: farmacograph-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      FG_ENVIRONMENT: ${FG_ENVIRONMENT:-development}
      FG_DATABASE_URL: ${FG_DATABASE_URL:-postgresql+asyncpg://farmacograph:farmacograph@postgres:5432/farmacograph}
      FG_NEO4J_ENABLED: ${FG_NEO4J_ENABLED:-true}
      FG_NEO4J_URI: ${FG_NEO4J_URI:-bolt://neo4j:7687}
      FG_NEO4J_USER: ${FG_NEO4J_USER:-neo4j}
      FG_NEO4J_PASSWORD: ${FG_NEO4J_PASSWORD:-farmacograph}
      FG_LOG_JSON: ${FG_LOG_JSON:-false}
      FG_JWT_SECRET_KEY: ${FG_JWT_SECRET_KEY:-dev-secret-change-in-production-32chars}
    ports:
      - "${FG_HOST_API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./farmacograph:/app/farmacograph:ro
      - ./ontology:/app/ontology:ro
      - ./staging:/app/staging:ro

  # Studio: NEXT_PUBLIC_* are baked at *build* time into JS chunks.
  # Changing FG_STUDIO_API_URL / FG_STUDIO_BASE_PATH requires rebuilding the image
  # (prefer: docker compose build --no-cache studio). Runtime env alone is not enough
  # for the client bundle; runtime NEXT_PUBLIC_BASE_PATH is still required because
  # `next start` re-reads next.config.ts for serving path.
  # Defaults are the public production origin — never localhost / 127.0.0.1.
  # `docker compose up -d --build api studio` rebuilds when Dockerfile/context
  # changes, but Compose may reuse a layer cache that still embeds a stale URL;
  # after env URL changes use --no-cache studio (deploy-production.sh does this).
  studio:
    build:
      context: ./apps/studio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${FG_STUDIO_API_URL:-https://farmacograph.furkanguven.space/api/v1}
        NEXT_PUBLIC_BASE_PATH: ${FG_STUDIO_BASE_PATH:-/studio}
    container_name: farmacograph-studio
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FG_HOST_STUDIO_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Must match build-time args (especially basePath for asset/routes serving)
      NEXT_PUBLIC_API_URL: ${FG_STUDIO_API_URL:-https://farmacograph.furkanguven.space/api/v1}
      NEXT_PUBLIC_BASE_PATH: ${FG_STUDIO_BASE_PATH:-/studio}
    # Document responses (not HEAD). Empty *public* HTML with working /_next is almost
    # always nginx Connection: upgrade — probe inside the container (bypass nginx).
    # Accept 200 HTML or a single 307 to /login that is not the returnTo=/login loop.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const base=process.env.NEXT_PUBLIC_BASE_PATH||'/studio';const path=base+'/';const req=http.get({host:'127.0.0.1',port:process.env.PORT||3000,path,headers:{Accept:'text/html',Connection:'close'}},res=>{let n=0;res.on('data',c=>n+=c.length);res.on('end',()=>{const loc=String(res.headers.location||'');const ok200=res.statusCode===200&&n>200;const ok307=res.statusCode>=300&&res.statusCode<400&&/\\/login\\/?($|\\?)/.test(loc)&&!/[?&]returnTo=(%2Flogin%2F|\\/login\\/?)/i.test(loc);process.exit(ok200||ok307?0:1);});});req.on('error',()=>process.exit(1));\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
  neo4jdata:
