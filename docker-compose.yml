# FarmacoGraph local development stack
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacograph-postgres
    environment:
      POSTGRES_USER: farmacograph
      POSTGRES_PASSWORD: farmacograph
      POSTGRES_DB: farmacograph
    ports:
      - "5433:5432"   # host 5432 often taken by system PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmacograph"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: farmacograph-neo4j
    environment:
      NEO4J_AUTH: neo4j/farmacograph
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: farmacograph-api
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      FG_ENVIRONMENT: development
      FG_DATABASE_URL: postgresql+asyncpg://farmacograph:farmacograph@postgres:5432/farmacograph
      FG_NEO4J_ENABLED: "true"
      FG_NEO4J_URI: bolt://neo4j:7687
      FG_NEO4J_USER: neo4j
      FG_NEO4J_PASSWORD: farmacograph
      FG_LOG_JSON: "false"
      FG_JWT_SECRET_KEY: dev-secret-change-in-production-32chars
    ports:
      - "8001:8000"   # host 8000 often taken by other apps
    volumes:
      - ./farmacograph:/app/farmacograph:ro
      - ./ontology:/app/ontology:ro

volumes:
  pgdata:
  neo4jdata:
