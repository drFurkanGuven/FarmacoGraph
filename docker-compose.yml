# FarmacoGraph local development stack
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacograph-postgres
    environment:
      POSTGRES_USER: farmacograph
      POSTGRES_PASSWORD: farmacograph
      POSTGRES_DB: farmacograph
    ports:
      - "${FG_HOST_PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmacograph"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: farmacograph-neo4j
    environment:
      NEO4J_AUTH: neo4j/farmacograph
      NEO4J_PLUGINS: '[]'
    ports:
      - "${FG_HOST_NEO4J_HTTP_PORT:-7474}:7474"
      - "${FG_HOST_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: farmacograph-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      FG_ENVIRONMENT: development
      FG_DATABASE_URL: postgresql+asyncpg://farmacograph:farmacograph@postgres:5432/farmacograph
      FG_NEO4J_ENABLED: "true"
      FG_NEO4J_URI: bolt://neo4j:7687
      FG_NEO4J_USER: neo4j
      FG_NEO4J_PASSWORD: farmacograph
      FG_LOG_JSON: "false"
      FG_JWT_SECRET_KEY: dev-secret-change-in-production-32chars
    ports:
      - "${FG_HOST_API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./farmacograph:/app/farmacograph:ro
      - ./ontology:/app/ontology:ro
      - ./staging:/app/staging:ro

  studio:
    build:
      context: ./apps/studio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${FG_STUDIO_API_URL:-https://farmacograph.furkanguven.space/api/v1}
        NEXT_PUBLIC_BASE_PATH: ${FG_STUDIO_BASE_PATH:-/studio}
    container_name: farmacograph-studio
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FG_HOST_STUDIO_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

volumes:
  pgdata:
  neo4jdata:
